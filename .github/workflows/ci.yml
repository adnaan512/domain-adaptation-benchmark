name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Python ${{ matrix.python-version }} — unit tests
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Install CPU-only PyTorch to keep CI fast and avoid GPU requirements
          pip install torch==2.1.0+cpu torchvision==0.16.0+cpu \
            --index-url https://download.pytorch.org/whl/cpu
          pip install -r requirements-dev.txt --no-deps
          pip install pytest pytest-cov pytest-timeout flake8 flake8-bugbear

      - name: Lint with flake8
        run: |
          # Stop build on syntax errors or undefined names
          flake8 src/ tests/ main.py examples/ \
            --count --select=E9,F63,F7,F82 \
            --show-source --statistics
          # Warn on style issues (max line length 99)
          flake8 src/ tests/ main.py examples/ \
            --count --exit-zero \
            --max-line-length=99 \
            --max-complexity=12 \
            --statistics

      - name: Run unit tests (mock data only — no downloads)
        timeout-minutes: 10
        run: |
          pytest tests/ \
            --timeout=120 \
            -v \
            --tb=short \
            --cov=src \
            --cov-report=term-missing \
            --cov-report=xml \
            -x

      - name: Upload coverage report
        uses: codecov/codecov-action@v4
        if: matrix.python-version == '3.11'
        with:
          file: ./coverage.xml
          fail_ci_if_error: false

  demo:
    name: Demo pipeline — Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install torch==2.1.0+cpu torchvision==0.16.0+cpu \
            --index-url https://download.pytorch.org/whl/cpu
          pip install numpy Pillow

      - name: Verify dry-run
        run: python main.py --dry-run

      - name: Run demo pipeline
        timeout-minutes: 10
        run: python examples/run_demo.py --num-samples 128 --batch-size 32

      - name: Verify HTML report was generated
        run: |
          test -f demo_report.html && echo "✓ demo_report.html exists"
          python -c "
          with open('demo_report.html') as f:
              content = f.read()
          assert '<html' in content, 'Missing html tag'
          assert 'Domain Adaptation' in content, 'Missing report title'
          assert 'mCE' in content, 'Missing mCE section'
          print('✓ HTML report structure verified')
          "
